# vim: ft=yaml

name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  rubygems:
    if: github.repository == 'jgraichen/acfs'
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1
        with:
          ruby-version: ruby-4.0
          bundler-cache: true
        env:
          BUNDLE_JOBS: 4
          BUNDLE_RETRY: 10

      - uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1

      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          changelog: CHANGELOG.md
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
