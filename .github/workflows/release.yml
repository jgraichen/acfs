# vim: ft=yaml

name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  rubygems:
    if: github.repository == 'jgraichen/acfs'
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      id-token: write

    env:
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 10
      BUNDLE_WITHOUT: development test

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1
        with:
          ruby-version: ruby-4.0
          bundler-cache: true

      - uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1

      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          changelog: CHANGELOG.md
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
